notARepository: 'skip'
promptToReturnFromSubprocess: false
gui:
  nerdFontsVersion: "3"
  switchTabsWithPanelJumpKeys: true
  showNumstatInFilesView: true
keybinding:
  files:
    viewResetOptions: 'G'
  commits:
    viewResetOptions: 'G'
git:
  fetchAll: false
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
